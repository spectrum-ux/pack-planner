const CITIES=Object.keys(T).map(k=>k.split(" ").map(w=>w[0].toUpperCase()+w.slice(1)).join(" ")).sort();

function getCityKey(city){const l=city.toLowerCase().replace(/,.*$/,"").trim();for(const k of Object.keys(T)){if(l.includes(k)||k.includes(l))return k;}return null;}
function getMonthlyTemps(city,sd,ed){
    const k=getCityKey(city);if(!k)return{avgHigh:18,avgLow:8,label:"Temperate",months:[]};
    const d=T[k],s=new Date(sd),e=new Date(ed),ms=new Set(),c=new Date(s);
    while(c<=e){ms.add(c.getMonth());c.setDate(c.getDate()+1);}
    const ma=[...ms],hi=ma.map(m=>d.high[m]),lo=ma.map(m=>d.low[m]);
    const aH=Math.round(hi.reduce((a,b)=>a+b,0)/hi.length),aL=Math.round(lo.reduce((a,b)=>a+b,0)/lo.length);
    return{avgHigh:aH,avgLow:aL,label:aH<=5?"Arctic":aH<=12?"Cold":aH<=22?"Temperate":aH<=30?"Warm":"Hot / Tropical",months:ma};
}
function ct(h){return h<=5?"arctic":h<=12?"cold":h<=22?"temperate":h<=30?"warm":"tropical";}

// ─── PACKING GENERATOR ───────────────────────────────────────────────────
function generatePackingList(city,days,adults,babies,sd,ed,bags){
    const temps=getMonthlyTemps(city,sd,ed),climate=ct(temps.avgHigh),containers=[];let id=0;const nid=()=>"c"+(++id);
    const sc=(b,p,mx)=>Math.min(mx,b+Math.floor(days*p));
    const bk=Object.keys(bags).filter(k=>bags[k]).sort((a,b)=>BAGS[a].cap-BAGS[b].cap);
    if(!bk.length)return{containers:[],temps};
    const asgA=()=>bk[0],asgB=()=>bk[bk.length-1],asgM=()=>bk[Math.min(1,bk.length-1)];

    for(let a=1;a<=adults;a++){
        const tops=sc(2,0.5,10),bot=sc(1,0.25,5),sox=sc(3,0.5,10);
        const items=climate==="arctic"||climate==="cold"?[`Thermal base layers (${tops}x)`,`Fleece tops (${Math.ceil(tops*0.6)}x)`,`Warm sweater (1x)`,`Warm trousers (${bot}x)`,`Thermal leggings (${Math.ceil(bot*0.5)}x)`,`Wool socks (${sox} pairs)`,`Sleepwear (1 set)`,`Underwear (${sc(3,0.8,12)}x)`]:climate==="warm"||climate==="tropical"?[`T-shirts (${tops}x)`,`Light shirts (${Math.ceil(tops*0.5)}x)`,`Shorts (${bot}x)`,`Light trousers (${Math.ceil(bot*0.5)}x)`,`Light socks (${sox} pairs)`,`Sleepwear (1 set)`,`Underwear (${sc(3,0.8,12)}x)`,`Swimsuit (1x)`]:[`Layering tops (${tops}x)`,`Light sweater (${Math.ceil(tops*0.4)}x)`,`Jeans / chinos (${bot}x)`,`Versatile trousers (${Math.ceil(bot*0.5)}x)`,`Socks (${sox} pairs)`,`Sleepwear (1 set)`,`Underwear (${sc(3,0.8,12)}x)`,`Light jacket (1x)`];
        containers.push({id:nid(),name:adults===1?"Clothes Cube":`Adult ${a} Clothes`,icon:a===1?"👕":"👗",size:Math.min(14,8+Math.floor(days*0.4)),location:asgA(),items});
    }
    for(let a=1;a<=adults;a++){
        const si=climate==="arctic"||climate==="cold"?["Waterproof hiking boots","Thermal socks (2 pairs)","Shoe bag"]:climate==="tropical"||climate==="warm"?["Walking shoes","Sandals / flip-flops","Shoe bag"]:["Waterproof shoes","Casual shoes","Shoe bag"];
        containers.push({id:nid(),name:adults===1?"Shoes":`Shoes (Adult ${a})`,icon:a===1?"👞":"👠",size:7,location:asgA(),items:si});
    }
    containers.push({id:nid(),name:"Toiletries",icon:"🧼",size:5+adults,location:asgM(),items:[`Toothbrush & paste (${adults}x)`,`Deodorant (${adults}x)`,climate==="tropical"?"Sunscreen SPF 50+":"Moisturizer","Hair brush","Face care","Travel shampoo"]});
    containers.push({id:nid(),name:"Medications",icon:"💊",size:4,location:asgB(),items:["Prescription meds","Paracetamol","Cold remedies","Allergy medicine","Plasters",climate==="tropical"?"Anti-diarrhea meds":"Throat lozenges"]});
    if(climate==="arctic"||climate==="cold")containers.push({id:nid(),name:"Outerwear",icon:"🧥",size:10,location:asgB(),items:[climate==="arctic"?"Heavy winter jacket":"Warm waterproof jacket","Fleece mid-layer","Warm hat","Insulated gloves",climate==="arctic"?"Neck gaiter":"Light scarf","Rain cover"]});
    else if(climate==="temperate")containers.push({id:nid(),name:"Outerwear",icon:"🧥",size:7,location:asgB(),items:["Light waterproof jacket","Packable umbrella","Light scarf","Hoodie / sweater"]});

    if(babies>0){
        const bt=sc(4,0.7,14),bb=sc(2,0.4,8);
        const bc=climate==="arctic"||climate==="cold"?[`Bodysuits (${bt}x)`,`Warm tops (${Math.ceil(bt*0.5)}x)`,`Warm trousers (${bb}x)`,`Warm socks (${sc(3,0.5,8)} pairs)`,`Mittens (2 pairs)`,`Warm hats (2x)`]:climate==="tropical"||climate==="warm"?[`Light bodysuits (${bt}x)`,`Short-sleeve tops (${Math.ceil(bt*0.5)}x)`,`Light pants (${bb}x)`,`Socks (${sc(2,0.3,6)} pairs)`,`Sun hat (1x)`,`UV top (1x)`]:[`Bodysuits (${bt}x)`,`Long-sleeve tops (${Math.ceil(bt*0.5)}x)`,`Pants (${bb}x)`,`Socks (${sc(3,0.4,7)} pairs)`,`Hat (1x)`,`Cardigan (1x)`];
        containers.push({id:nid(),name:"Baby Clothes 1",icon:"👶",size:Math.min(10,6+Math.floor(days*0.3)),location:asgB(),items:bc});
        containers.push({id:nid(),name:"Baby Clothes 2",icon:"🍼",size:Math.min(9,5+Math.floor(days*0.3)),location:asgB(),items:[`Extra bodysuits (${Math.ceil(bt*0.4)}x)`,climate==="arctic"?"Fleece snowsuit":"Light jacket",`Cardigans (2x)`,`Pyjamas (${sc(2,0.2,5)}x)`,`Blankets (2x)`,climate==="arctic"?"Bunting bag":"Muslin cloths (3x)"]});
        containers.push({id:nid(),name:"Baby Food",icon:"🥣",size:9,location:asgB(),items:[`Formula (${Math.ceil(days*0.4)} lbs)`,"Bottles (4-6)","Nipples",`Food jars (${sc(6,1.2,18)}x)`,"Snacks","Utensils"]});
        containers.push({id:nid(),name:"Diapers & Wipes",icon:"🩷",size:10,location:asgB(),items:[`Diapers (${sc(15,3,50)})—half supply`,"Wet wipes","Diaper cream",`Bibs (${sc(4,0.5,10)}x)`,"Changing mat","Nappy bags"]});
        containers.push({id:nid(),name:"Baby Medicine",icon:"🩹",size:4,location:asgB(),items:["Infant pain relief","Thermometer","Saline drops","Teething gel","Rash cream",climate==="tropical"?"Baby sunscreen":"Baby moisturizer"]});
        containers.push({id:nid(),name:"Baby Toys",icon:"🧸",size:5,location:asgB(),items:["Stuffed toy","Teething toys (2-3)","Board book","Rattle","Pacifiers (2-3)","Pacifier clips"]});
    }
    containers.forEach((c,i)=>c.color=COLORS[i%COLORS.length]);
    // Balance
    for(const b of bk){let tot=containers.filter(c=>c.location===b).reduce((s,c)=>s+c.size,0);if(tot>BAGS[b].cap){const ov=containers.filter(c=>c.location===b).sort((a,b2)=>a.size-b2.size);for(const it of ov){if(tot<=BAGS[b].cap)break;for(const o of bk){if(o===b)continue;const oT=containers.filter(c=>c.location===o).reduce((s,c)=>s+c.size,0);if(oT+it.size<=BAGS[o].cap){it.location=o;tot-=it.size;break;}}}}}
    return{containers,temps};
}

// ─── EMAIL / NOTES BUILDERS ───────────────────────────────────────────────
function buildEmailBody(containers,ti,temps,ab){
    const fD=d=>new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
    let b=`PACKING LIST\n${ti.city} · ${fD(ti.startDate)} – ${fD(ti.endDate)} (${ti.days}d)\n${ti.adults} adult${ti.adults>1?"s":""}${ti.babies>0?`, ${ti.babies} child${ti.babies>1?"ren":""}`:""}\n🌡️ ${temps.avgLow}°C–${temps.avgHigh}°C (${temps.label})\n\n`;
    for(const bk of Object.keys(ab).filter(k=>ab[k])){const items=containers.filter(c=>c.location===bk);const tot=items.reduce((s,c)=>s+c.size,0);b+=`${BAGS[bk].emoji} ${bk.toUpperCase()} (${tot}L/${BAGS[bk].cap}L)\n`;items.forEach(c=>{b+=`\n  ${c.icon} ${c.name} (${c.size}L)\n`;c.items.forEach(i=>b+=`     [ ] ${i}\n`);});}
    const stg=containers.filter(c=>c.location==="staging");if(stg.length)stg.forEach(c=>{b+=`\n  ${c.icon} ${c.name}\n`;c.items.forEach(i=>b+=`     [ ] ${i}\n`);});
    return b;
}
function buildChecklist(containers,ti,temps,ab){
    const fD=d=>new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
    let t=`🧳 PACKING CHECKLIST\n${ti.city} · ${fD(ti.startDate)} – ${fD(ti.endDate)}\n${ti.adults} adult${ti.adults>1?"s":""}${ti.babies>0?`, ${ti.babies} child${ti.babies>1?"ren":""}`:""}\n🌡️ ${temps.avgLow}°C–${temps.avgHigh}°C\n\n`;
    for(const bk of Object.keys(ab).filter(k=>ab[k])){const items=containers.filter(c=>c.location===bk);const tot=items.reduce((s,c)=>s+c.size,0);t+=`━━━━━━━━━━━━━━━━━━━━\n${BAGS[bk].emoji} ${bk.toUpperCase()} (${tot}L/${BAGS[bk].cap}L)\n━━━━━━━━━━━━━━━━━━━━\n\n`;items.forEach(c=>{t+=`${c.icon} ${c.name} (${c.size}L)\n`;c.items.forEach(i=>t+=`☐ ${i}\n`);t+=`\n`;});}
    return t;
}

function LoadingScreen({trip,onDone}){

function NotesModal({onClose,containers,tripInfo,temps,activeBags}){
    const[copied,setCopied]=useState(false);
    const txt=buildChecklist(containers,tripInfo,temps,activeBags);
    const handleCopy=async()=>{
        try{await navigator.clipboard.writeText(txt);}catch{const ta=document.createElement("textarea");ta.value=txt;ta.style.cssText="position:fixed;left:-9999px";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);}
        setCopied(true);setTimeout(()=>{try{window.open("mobilenotes://","_blank");}catch{}},500);
    };
    const handleShare=async()=>{if(navigator.share){try{await navigator.share({title:`Packing: ${tripInfo.city}`,text:txt});setCopied(true);}catch{}}};
    const hasShare=typeof navigator!=="undefined"&&typeof navigator.share==="function";
    return(<div className="fixed inset-0 bg-black/60 modal-overlay z-50 flex items-end sm:items-center justify-center" onClick={onClose}><div className="bg-white rounded-t-2xl sm:rounded-2xl shadow-2xl w-full sm:max-w-md overflow-hidden safe-bottom" onClick={e=>e.stopPropagation()}><div className="bg-yellow-500 p-5"><div className="w-10 h-1 bg-white/30 rounded-full mx-auto mb-3 sm:hidden"/><div className="flex justify-between items-start"><div><h2 className="text-lg font-bold text-white flex items-center gap-2"><NotesIcon size={20}/> Apple Notes</h2><p className="text-yellow-100 text-xs mt-1">Export as checklist</p></div><button onClick={onClose} className="w-10 h-10 flex items-center justify-center text-xl text-white/70 hover:text-white font-bold">×</button></div></div>
    <div className="p-5">{copied?(<div className="text-center py-6"><div className="text-4xl mb-2">✅</div><p className="font-bold text-slate-900">Checklist copied!</p><p className="text-slate-500 text-sm mt-2">Paste in Apple Notes → select all → tap ☑ icon</p><div className="mt-4 bg-yellow-50 border border-yellow-200 rounded-xl p-3"><p className="text-xs text-yellow-700">💡 This converts ☐ items into tappable checkboxes</p></div></div>):(<><div className="bg-slate-50 rounded-xl p-3 mb-4 border border-slate-200 max-h-40 overflow-y-auto"><pre className="text-xs text-slate-600 whitespace-pre-wrap font-mono">{txt.slice(0,400)}…</pre></div><div className="space-y-2"><button onClick={handleCopy} className="w-full bg-yellow-500 hover:bg-yellow-400 active:bg-yellow-300 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2"><NotesIcon size={16}/> Copy & Open Notes</button>{hasShare&&<button onClick={handleShare} className="w-full bg-slate-100 hover:bg-slate-200 active:bg-slate-300 text-slate-700 font-semibold py-3 rounded-xl flex items-center justify-center gap-2 text-sm">📤 Share via…</button>}</div></>)}</div></div></div>);
}

// ─── DROP ZONE (with tap-to-place target) ─────────────────────────────────
function DropZone({location,capacity,items,selectedItem,onPlaceHere,onDragOver,onDrop,onSelect,onDragStart,onLongPress,label,draggedItem}){
    const used=items.reduce((s,c)=>s+c.size,0);const isFull=capacity!==Infinity&&used>capacity;const pct=capacity!==Infinity?Math.min((used/capacity)*100,100):0;
    const canDrop=selectedItem&&selectedItem.location!==location&&(location==="staging"||used+selectedItem.size<=capacity);
    const styles={small:"border-orange-300 bg-orange-50",medium:"border-blue-300 bg-blue-50",large:"border-green-300 bg-green-50",staging:"border-slate-300 bg-slate-50"};

    return(<div onDragOver={onDragOver} onDrop={e=>onDrop(e,location)} className={`rounded-xl border-2 border-dashed p-4 transition-all ${styles[location]||styles.staging} ${draggedItem&&draggedItem.location!==location?"ring-2 ring-yellow-400":""} ${isFull?"ring-2 ring-red-500":""}`}>
        <div className="mb-3">
            <div className="flex items-center justify-between mb-2"><h3 className="font-bold text-sm">{label}</h3>{capacity!==Infinity&&<span className="text-xs font-bold text-slate-600">{used}/{capacity}L</span>}</div>
            {capacity!==Infinity&&(<><div className="h-2.5 bg-gray-200 rounded-full overflow-hidden mb-1"><div className={`h-full rounded-full transition-all ${pct<=80?"bg-green-500":pct<=100?"bg-yellow-500":"bg-red-500"}`} style={{width:`${pct}%`}}/></div><p className={`text-xs font-semibold ${isFull?"text-red-600":"text-green-600"}`}>{isFull?"❌ Over":"✅ "+(capacity-used)+"L free"}</p></>)}
        </div>

        {/* Tap-to-place target button — shows when a container is selected */}
        {canDrop&&(<button onClick={()=>onPlaceHere(location)} className="w-full mb-3 py-3 rounded-xl border-2 border-dashed border-blue-400 bg-blue-100 text-blue-700 font-bold text-sm flex items-center justify-center gap-2 active:bg-blue-200 transition-all animate-pulse">
            📥 Tap to place here ({selectedItem.name})
        </button>)}

        <div className={`grid gap-2 ${location==="staging"?"grid-cols-1 sm:grid-cols-2":"grid-cols-2"}`}>
            {items.length===0?(<div className="col-span-full flex flex-col items-center justify-center py-10 text-slate-400"><span className="text-2xl mb-1 opacity-30">📭</span><p className="text-xs">Empty</p></div>)
            :items.map(c=><ContainerCard key={c.id} container={c} isSelected={selectedItem?.id===c.id} isDragging={draggedItem?.id===c.id} onSelect={onSelect} onDragStart={onDragStart} onLongPress={onLongPress}/>)}
        </div>
    </div>);
}

// ─── ORGANIZER ────────────────────────────────────────────────────────────
function OrganizerScreen({containers,setContainers,original,tripInfo,temps,activeBags,onReset,onNewTrip}){
    const[dragged,setDragged]=useState(null);const[selected,setSelected]=useState(null);
    const[detailView,setDetailView]=useState(null);const[showEmail,setShowEmail]=useState(false);const[showNotes,setShowNotes]=useState(false);

    const inLoc=loc=>containers.filter(c=>c.location===loc);
    const sizeOf=loc=>inLoc(loc).reduce((s,c)=>s+c.size,0);
    const bagKeys=Object.keys(activeBags).filter(k=>activeBags[k]);
    const totalPacked=bagKeys.reduce((s,k)=>s+sizeOf(k),0);
    const totalCap=bagKeys.reduce((s,k)=>s+BAGS[k].cap,0);
    const overCap=bagKeys.some(k=>sizeOf(k)>BAGS[k].cap);

    // Tap to select / deselect
    const handleSelect=(c)=>{
        if(selected?.id===c.id){setSelected(null);}
        else{setSelected(c);}
    };
    // Long press to open detail
    const handleLongPress=(c)=>{setDetailView(c);};
    // Tap zone to place selected container
    const handlePlaceHere=(target)=>{
        if(!selected)return;
        setContainers(prev=>prev.map(c=>c.id===selected.id?{...c,location:target}:c));
        setSelected(null);
    };
    // Desktop drag
    const handleDragStart=(e,c)=>{e.dataTransfer.effectAllowed="move";setDragged(c);};
    const handleDragOver=e=>{e.preventDefault();e.dataTransfer.dropEffect="move";};
    const handleDrop=(e,target)=>{
        e.preventDefault();if(!dragged||dragged.location===target){setDragged(null);return;}
        const cap=BAGS[target]?BAGS[target].cap:Infinity;
        if(target!=="staging"&&sizeOf(target)+dragged.size>cap){setDragged(null);return;}
        setContainers(prev=>prev.map(c=>c.id===dragged.id?{...c,location:target}:c));setDragged(null);
    };
    const fD=d=>new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short"});

    return(<>
        <DetailModal container={detailView} onClose={()=>setDetailView(null)}/>
        {showEmail&&<EmailModal onClose={()=>setShowEmail(false)} containers={containers} tripInfo={tripInfo} temps={temps} activeBags={activeBags}/>}
        {showNotes&&<NotesModal onClose={()=>setShowNotes(false)} containers={containers} tripInfo={tripInfo} temps={temps} activeBags={activeBags}/>}
        <div className="min-h-screen bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 p-3 md:p-6 safe-bottom">
        <div className="max-w-7xl mx-auto">
            {/* Header */}
            <div className="flex flex-wrap justify-between items-start gap-3 mb-4">
                <div><h1 className="text-xl md:text-3xl font-bold text-white mb-1.5">Your Packing Plan</h1><div className="flex flex-wrap gap-1">{[`📍 ${tripInfo.city}`,`📅 ${fD(tripInfo.startDate)}–${fD(tripInfo.endDate)} (${tripInfo.days}d)`,`🌡️ ${temps.avgLow}°–${temps.avgHigh}°C`].map((t,i)=><span key={i} className="bg-white/10 text-blue-200 text-xs px-2 py-0.5 rounded-full border border-white/10">{t}</span>)}</div></div>
                <div className="flex gap-1.5 flex-wrap"><button onClick={()=>setShowEmail(true)} className="flex items-center gap-1 bg-green-500 active:bg-green-400 text-white font-semibold py-2 px-3 rounded-lg text-xs"><MailIcon size={13}/> Email</button><button onClick={()=>setShowNotes(true)} className="flex items-center gap-1 bg-yellow-500 active:bg-yellow-400 text-white font-semibold py-2 px-3 rounded-lg text-xs"><NotesIcon size={13}/> Notes</button><button onClick={()=>{onReset();setSelected(null);}} className="flex items-center gap-1 bg-white/10 active:bg-white/20 border border-white/20 text-white font-semibold py-2 px-3 rounded-lg text-xs"><RotateCcwIcon size={13}/> Reset</button><button onClick={onNewTrip} className="flex items-center gap-1 bg-blue-500 active:bg-blue-400 text-white font-semibold py-2 px-3 rounded-lg text-xs">✈️ New</button></div>
            </div>

            {/* Stats */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4">
                <div className="bg-white/10 rounded-xl p-3 border border-white/15"><p className="text-blue-300 text-xs">Total</p><p className="text-white text-xl font-bold">{totalPacked}L</p><p className="text-blue-300 text-xs">{Math.round((totalPacked/totalCap)*100)}%</p></div>
                {bagKeys.map(k=>{const u=sizeOf(k),c=BAGS[k].cap;return(<div key={k} className="bg-white/10 rounded-xl p-3 border border-white/15"><p className="text-blue-300 text-xs">{BAGS[k].emoji} {k[0].toUpperCase()+k.slice(1)}</p><p className="text-white text-xl font-bold">{u}L</p><p className={`text-xs ${u>c?"text-red-400":"text-blue-300"}`}>{u>c?"❌":"✅ "+(c-u)+"L"}</p></div>);})}
            </div>

            {overCap&&<div className="bg-red-500/20 border border-red-400/30 rounded-xl p-3 mb-3 flex gap-2 items-center"><span className="text-red-400"><AlertCircleIcon size={16}/></span><p className="text-red-200 text-sm"><strong>Over capacity.</strong> Move items.</p></div>}

            {/* Interaction hint */}
            <div className="bg-emerald-500/10 border border-emerald-400/20 rounded-xl px-3 py-2 mb-4 text-emerald-200 text-sm">
                {selected
                    ? `✅ "${selected.name}" selected — tap a bag below to move it, or tap again to deselect`
                    : "💡 Tap a container to select it → tap a bag zone to move it there. Long-press to see full checklist."}
            </div>

            {/* Drop zones */}
            <div className="space-y-4 mb-4">
                <div className={`grid grid-cols-1 md:grid-cols-${Math.min(bagKeys.length,3)} gap-4`}>
                    {bagKeys.map(k=><DropZone key={k} location={k} capacity={BAGS[k].cap} items={inLoc(k)} selectedItem={selected} onPlaceHere={handlePlaceHere} onDragOver={handleDragOver} onDrop={handleDrop} onSelect={handleSelect} onDragStart={handleDragStart} onLongPress={handleLongPress} draggedItem={dragged} label={`${BAGS[k].emoji} ${k[0].toUpperCase()+k.slice(1)} (${BAGS[k].cap}L)`}/>)}
                </div>
                <DropZone location="staging" capacity={Infinity} items={inLoc("staging")} selectedItem={selected} onPlaceHere={handlePlaceHere} onDragOver={handleDragOver} onDrop={handleDrop} onSelect={handleSelect} onDragStart={handleDragStart} onLongPress={handleLongPress} draggedItem={dragged} label="🗂️ Staging"/>
            </div>

            <div className="grid grid-cols-2 gap-2 text-xs text-blue-300">{["✓ Heavy items at bottom","✓ Roll clothes","✓ Shoes fill gaps","✓ Meds in carry-on"].map((t,i)=><div key={i} className="bg-white/5 rounded-lg px-3 py-2 border border-white/5">{t}</div>)}</div>
        </div></div>
    </>);
}

// ─── ROOT ─────────────────────────────────────────────────────────────────
function App(){
    const[screen,setScreen]=useState("form");const[tripInfo,setTripInfo]=useState(null);
    const[containers,setContainers]=useState([]);const[original,setOriginal]=useState([]);const[temps,setTemps]=useState(null);

    const handleSubmit=trip=>{setTripInfo(trip);setScreen("loading");};
    const handleDone=()=>{const r=generatePackingList(tripInfo.city,tripInfo.days,tripInfo.adults,tripInfo.babies,tripInfo.startDate,tripInfo.endDate,tripInfo.bags);setContainers(r.containers);setOriginal(r.containers.map(c=>({...c})));setTemps(r.temps);setScreen("organizer");};
    const handleReset=()=>setContainers(original.map(c=>({...c})));
    const handleNew=()=>{setContainers([]);setOriginal([]);setTripInfo(null);setTemps(null);setScreen("form");};

    if(screen==="form")return<FormScreen onSubmit={handleSubmit}/>;
    if(screen==="loading")return<LoadingScreen trip={tripInfo} onDone={handleDone}/>;
    if(screen==="organizer")return<OrganizerScreen containers={containers} setContainers={setContainers} original={original} tripInfo={tripInfo} temps={temps} activeBags={tripInfo.bags} onReset={handleReset} onNewTrip={handleNew}/>;
    return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
